name: Playwright Tests

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'  # Daily regression tests at 2 AM

jobs:
  # SMOKE TESTS - Run on every push
  smoke-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Smoke Tests E2E
        run: npm run test:smoke
        # continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: smoke-tests-report
          path: playwright-report/
          retention-days: 30

  # REGRESSION TESTS - Full test suite
  regression-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[regression]')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run API Tests (All)
        run: npm run test:api
        continue-on-error: true

      - name: Run Regression Tests E2E
        run: npx playwright test --project=e2e-chrome --project=e2e-firefox --grep @regression -- --retries=1
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: regression-tests-report
          path: playwright-report/
          retention-days: 30
